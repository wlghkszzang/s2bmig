<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/default}">

<head>
    <title>Dashboard</title>
</head>

<body>
    <div layout:fragment="content">
        <header class="header">
            <div class="welcome-text">
                <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.75rem; font-weight: 700;">반갑습니다, 어드민님 👋</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Migproject 통합 관리 시스템에 오신 것을 환영합니다.</p>
            </div>
        </header>

        <section class="stats-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
            <div class="stat-card"
                style="background-color: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);">
                <div class="stat-icon icon-blue"
                    style="width: 44px; height: 44px; border-radius: 12px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: rgba(79, 70, 229, 0.1); color: var(--primary-color);">
                    <i class="fa-solid fa-box-archive"></i>
                </div>
                <div class="stat-info">
                    <h3 style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">총 상품 수</h3>
                    <span style="font-size: 1.5rem; font-weight: 700;">1,234 건</span>
                </div>
                <a href="#" class="quick-action-btn"
                    style="color: var(--primary-color); text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-top: 1rem;">
                    자세히 보기 <i class="fa-solid fa-arrow-right-long"></i>
                </a>
            </div>

            <div class="stat-card"
                style="background-color: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);">
                <div class="stat-icon icon-green"
                    style="width: 44px; height: 44px; border-radius: 12px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: rgba(16, 185, 129, 0.1); color: #10b981;">
                    <i class="fa-solid fa-tags"></i>
                </div>
                <div class="stat-info">
                    <h3 style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">옵션 분류코드</h3>
                    <span style="font-size: 1.5rem; font-weight: 700;">38 건</span>
                </div>
                <a href="/goods/optionMgmt.optionMgmtView.do" class="quick-action-btn"
                    style="color: var(--primary-color); text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-top: 1rem;">
                    관리 이동 <i class="fa-solid fa-arrow-right-long"></i>
                </a>
            </div>
        </section>
    </div>
</body>

</html>
